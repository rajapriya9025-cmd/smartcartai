<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCartAI – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-50:  #eff6ff;
    --blue-100: #dbeafe;
    --blue-200: #bfdbfe;
    --blue-300: #93c5fd;
    --blue-400: #60a5fa;
    --blue-500: #3b82f6;
    --blue-600: #2563eb;
    --card-bg:  #ffffff;
    --text-dark:#1e293b;
    --text-mid: #475569;
    --text-soft:#94a3b8;
    --radius:   18px;
    --shadow:   0 20px 60px rgba(59,130,246,.12), 0 4px 16px rgba(0,0,0,.06);
  }
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #e0f0ff 0%, #f0f7ff 40%, #dbeafe 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Animated blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: .35;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
  }
  .blob-1 { width:340px;height:340px;background:#93c5fd;top:-80px;left:-80px;animation-delay:0s; }
  .blob-2 { width:260px;height:260px;background:#60a5fa;bottom:-60px;right:-60px;animation-delay:3s; }
  .blob-3 { width:200px;height:200px;background:#bfdbfe;top:50%;left:60%;animation-delay:5s; }
  @keyframes float {
    0%,100%{ transform:translateY(0) scale(1); }
    50%    { transform:translateY(-30px) scale(1.05); }
  }

  /* Card wrapper */
  .page-center {
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    padding:24px;
  }
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 380px;
    padding: 36px 32px 28px;
    animation: slideUp .6s cubic-bezier(.22,1,.36,1) both;
    position: relative;
    z-index: 10;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(28px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Logo & heading */
  .brand {
    display:flex; align-items:center; gap:10px;
    justify-content:center; margin-bottom:20px;
  }
  .brand-icon {
    width:38px;height:38px;
    background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    box-shadow: 0 4px 12px rgba(59,130,246,.35);
    animation: pulse-icon 3s ease-in-out infinite;
  }
  @keyframes pulse-icon {
    0%,100%{box-shadow:0 4px 12px rgba(59,130,246,.35);}
    50%    {box-shadow:0 4px 20px rgba(59,130,246,.6);}
  }
  .brand-name {
    font-family:'Playfair Display',serif;
    font-size:1.25rem; font-weight:700;
    color: var(--blue-600);
    letter-spacing:.01em;
  }
  .card-title {
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:1.55rem; font-weight:700;
    color: var(--text-dark);
    margin-bottom:6px;
  }
  .card-subtitle {
    text-align:center;
    font-size:.82rem; color:var(--text-soft);
    margin-bottom:24px;
  }

  /* Form */
  .field { margin-bottom:14px; }
  .field label {
    display:block; font-size:.78rem; font-weight:500;
    color:var(--text-mid); margin-bottom:5px;
  }
  .field input {
    width:100%; padding:11px 14px;
    border:1.5px solid var(--blue-100);
    border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:.88rem;
    color:var(--text-dark);
    background:#f8fbff;
    outline:none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--blue-400);
    box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    background:#fff;
  }
  .row-opt {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:18px; font-size:.78rem;
  }
  .remember { display:flex; align-items:center; gap:6px; color:var(--text-mid); cursor:pointer; }
  .remember input[type=checkbox] { accent-color: var(--blue-500); width:14px;height:14px; }
  .forgot { color:var(--blue-500); text-decoration:none; font-weight:500; transition:color .2s; }
  .forgot:hover { color:var(--blue-600); }

  .btn-primary {
    width:100%; padding:12px;
    background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
    color:#fff; border:none; border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:600;
    cursor:pointer; letter-spacing:.03em;
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 4px 14px rgba(59,130,246,.4);
    margin-bottom:12px;
  }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(59,130,246,.5); }
  .btn-primary:active { transform:translateY(0); }

  .btn-secondary {
    width:100%; padding:11px;
    background:transparent;
    color:var(--blue-600); border:1.5px solid var(--blue-300);
    border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:.88rem; font-weight:600;
    cursor:pointer;
    transition: background .15s, border-color .2s;
    margin-bottom:8px;
  }
  .btn-secondary:hover { background:var(--blue-50); border-color:var(--blue-400); }

  /* Error */
  .error-msg {
    background:#fef2f2; border:1px solid #fecaca; border-radius:8px;
    color:#dc2626; font-size:.8rem; padding:9px 12px; margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
  }

  /* Bottom nav icons */
  .bottom-nav {
    display:flex; justify-content:space-around; align-items:center;
    padding:18px 0 6px;
    border-top:1px solid var(--blue-100);
    margin-top:8px;
  }
  .nav-item {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--text-soft); font-size:.7rem; cursor:pointer;
    transition:color .2s;
  }
  .nav-item:hover { color:var(--blue-500); }
  .nav-icon { font-size:1.2rem; }

  /* Quote */
  .quote-section {
    text-align:center; margin-top:18px; padding-top:14px;
    border-top:1px solid var(--blue-100);
  }
  .quote-text {
    font-style:italic; font-size:.78rem; color:var(--text-mid);
    line-height:1.55;
  }
  .quote-author { font-size:.72rem; color:var(--text-soft); margin-top:5px; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="page-center">
  <div class="card">

    <div class="brand">
      <div class="brand-icon">🛒</div>
      <span class="brand-name">SmartCartAI</span>
    </div>

    <h1 class="card-title">Welcome Back</h1>
    <p class="card-subtitle">Sign in to your personalised shopping experience</p>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>User ID / Username</label>
        <input type="text" name="username" placeholder="Enter your user ID" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="row-opt">
        <label class="remember">
          <input type="checkbox"> Remember Me
        </label>
        <a href="#" class="forgot">Forgot Password?</a>
      </div>
      <button class="btn-primary" type="submit">SIGN IN</button>
    </form>

    <a href="/register"><button class="btn-secondary" type="button">NEW CUSTOMER? CREATE ACCOUNT</button></a>

    <!-- Bottom nav icons (from reference) -->
    <div class="bottom-nav">
      <div class="nav-item"><span class="nav-icon">🏠</span>Home</div>
      <div class="nav-item"><span class="nav-icon">👗</span>Apparel</div>
      <div class="nav-item"><span class="nav-icon">🎁</span>Gifts</div>
      <div class="nav-item"><span class="nav-icon">💛</span>Collections</div>
    </div>

    <!-- Quote from reference image -->
    <div class="quote-section">
      <p class="quote-text">"I spent hours shopping, and now I'm spending more hours trying to remember my password."</p>
      <p class="quote-author">— SmartCartAI Design Team</p>
    </div>

  </div>
</div>
</body>
</html>
